name: YCT App Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Android APK + AAB ─────────────────────────────────────
  build-android:
    name: Build Android (APK + AAB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK (split by ABI)
        run: flutter build apk --release --split-per-abi

      - name: Build App Bundle (AAB for Play Store)
        run: flutter build appbundle --release

      - name: Upload ARM64 APK (modern phones)
        uses: actions/upload-artifact@v4
        with:
          name: yct-arm64-apk
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

      - name: Upload ARM32 APK (older phones)
        uses: actions/upload-artifact@v4
        with:
          name: yct-arm32-apk
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          retention-days: 30

      - name: Upload AAB (Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: yct-playstore-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  # ── iOS ───────────────────────────────────────────────────
  build-ios:
    name: Build iOS (unsigned)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios && pod install --repo-update

      - name: Build iOS (no codesign — simulator/sideload)
        run: flutter build ios --release --no-codesign
        continue-on-error: true  # Signing error is expected without Apple cert

      - name: Package Runner.app as zip
        run: |
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            cd build/ios/iphoneos
            zip -r Runner-unsigned.zip Runner.app
            echo "IOS_BUILD_SUCCESS=true" >> $GITHUB_ENV
          else
            echo "IOS_BUILD_SUCCESS=false" >> $GITHUB_ENV
          fi

      - name: Upload iOS unsigned build
        if: env.IOS_BUILD_SUCCESS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: yct-ios-unsigned
          path: build/ios/iphoneos/Runner-unsigned.zip
          retention-days: 30
