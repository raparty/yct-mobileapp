name: yct_app
description: Yoga Consciousness Trust — Official App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP requests (fetch Google Sheet data)
  http: ^1.2.0

  # Open PDFs in native device viewer
  url_launcher: ^6.2.5

  # Share sheet
  share_plus: ^7.2.2

  # Caching images
  cached_network_image: ^3.3.1

  # Local storage for bookmarks
  shared_preferences: ^2.2.2

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
