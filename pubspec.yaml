name: yct_app
description: Yoga Consciousness Trust — Official App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase — Firestore for content database
  firebase_core: ^3.3.0
  cloud_firestore: ^5.3.0

  # Networking
  http: ^1.2.0

  # PDF viewer
  webview_flutter: ^4.4.4

  # Audio player
  audioplayers: ^6.0.0

  # Utilities
  url_launcher: ^6.2.5
  share_plus: ^7.2.2
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/yct_logo.png
    - assets/images/guruji.jpg
