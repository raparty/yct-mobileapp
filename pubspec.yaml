name: yct_app
description: Yoga Consciousness Trust — Official App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  url_launcher: ^6.2.5
  share_plus: ^7.2.2
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.6

  # WebView for Google Drive PDF preview
  webview_flutter: ^4.4.4

  # PDF download + view
  flutter_pdfview: ^1.3.2
  dio: ^5.4.1
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
